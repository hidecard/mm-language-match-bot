<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM Language Match Bot Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-indigo-900 text-white flex-shrink-0">
            <div class="p-6">
                <h1 class="text-2xl font-bold">Admin Panel</h1>
                <p class="text-indigo-300 text-sm">MM Language Match Bot</p>
            </div>
            <nav class="mt-6">
                <a href="#" onclick="showSection('users')" class="flex items-center py-3 px-6 hover:bg-indigo-800 transition-colors" id="nav-users">
                    <i class="fas fa-users mr-3"></i> Users
                </a>
                <a href="#" onclick="showSection('vocabularies')" class="flex items-center py-3 px-6 hover:bg-indigo-800 transition-colors" id="nav-vocabularies">
                    <i class="fas fa-book mr-3"></i> Vocabularies
                </a>
                <a href="#" onclick="showSection('phrases')" class="flex items-center py-3 px-6 hover:bg-indigo-800 transition-colors" id="nav-phrases">
                    <i class="fas fa-comments mr-3"></i> Phrases
                </a>
                <a href="#" onclick="showSection('sessions')" class="flex items-center py-3 px-6 hover:bg-indigo-800 transition-colors" id="nav-sessions">
                    <i class="fas fa-exchange-alt mr-3"></i> Sessions
                </a>
                <a href="#" onclick="showSection('queue')" class="flex items-center py-3 px-6 hover:bg-indigo-800 transition-colors" id="nav-queue">
                    <i class="fas fa-list-ol mr-3"></i> Match Queue
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8">
            <!-- Header -->
            <header class="mb-8 flex justify-between items-center">
                <h2 id="section-title" class="text-3xl font-semibold text-gray-800">Users</h2>
                <div id="action-buttons">
                    <!-- Dynamic buttons based on section -->
                </div>
            </header>

            <!-- Content Area -->
            <div id="content-area" class="bg-white rounded-lg shadow overflow-hidden">
                <!-- Data will be loaded here via JS -->
                <div class="p-10 text-center text-gray-500">
                    <i class="fas fa-spinner fa-spin fa-3x mb-4"></i>
                    <p>Loading data...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold">Add New</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modal-body" class="p-6">
                <!-- Dynamic form content -->
            </div>
            <div class="p-6 border-t flex justify-end space-x-3">
                <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded hover:bg-gray-300">Cancel</button>
                <button id="modal-submit" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">Save</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
